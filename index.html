<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shoe Bazzar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      line-height: 1.6;
    }
    a { text-decoration: none; color: inherit; }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      background: rgba(11,11,11,0.95);
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #d4af37;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      color: #ddd;
    }

    .hero {
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 60px 8%;
      gap: 40px;
    }

    .hero-text h1 {
      font-size: 58px;
      margin-bottom: 20px;
    }

    .hero-text span { color: #d4af37; }

    .hero-text p {
      color: #bbb;
      max-width: 500px;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #d4af37;
      color: #000;
      border-radius: 8px;
      font-weight: bold;
    }

    .hero-image img {
      width: 100%;
      max-width: 500px;
      border-radius: 20px;
    }

    .section {
      padding: 70px 8%;
    }

    .section h2 {
      font-size: 36px;
      margin-bottom: 30px;
      color: #d4af37;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .card {
      background: #151515;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 20px;
      transition: transform 0.25s ease;
    }

    .card:hover { transform: translateY(-5px); }

    .card img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .card h3 { margin-bottom: 8px; }
    .price { color: #d4af37; font-weight: bold; }

    .newsletter {
      background: #121212;
      border-radius: 20px;
      text-align: center;
      padding: 50px 20px;
    }

    .newsletter input {
      padding: 14px;
      width: 280px;
      border: none;
      border-radius: 8px;
      margin: 15px 10px 0 0;
    }

    .footer {
      text-align: center;
      padding: 25px;
      color: #888;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }
      .hero-text h1 { font-size: 42px; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">HypeKicks</div>
    <div class="nav-links">
      <a href="#home">Home</a>
      <a href="#shop">Shop</a>
      <a href="#new">New Drops</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <section class="hero" id="home">
    <div class="hero-text">
      <h1>Step Into <span>Luxury</span></h1>
      <a href="#shop" class="btn">Shop Now</a>
    </div>
    <div class="hero-image">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Sneaker" />
    </div>
  </section>

  <section class="section" id="shop">
    <h2>Featured Sneakers</h2>
    <div class="products">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1549298916-b41d501d3772" alt="shoe1">
        <h3>Air Gold</h3>
        <p class="price">₹8,999</p>
      </div>
      <div class="card">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" alt="shoe2">
        <h3>Street Runner X</h3>
        <p class="price">₹6,499</p>
      </div>
      <div class="card">
        <img src="https://images.unsplash.com/photo-1608231387042-66d1773070a5" alt="shoe3">
        <h3>Urban Boost</h3>
        <p class="price">₹7,299</p>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="newsletter">
      <h2>Get New Sneaker</h2>
      <p style="color:#aaa; margin-top:10px;">Subscribe for exclusive launches and discounts.</p>
      <input type="email" placeholder="Enter your email" />
      <a href="#" class="btn">Subscribe</a>
    </div>
  </section>

  <footer class="footer" id="contact">
    © 2026 Shoe Bazzar. All rights reserved.
  </footer>
</body>
</html>
